<!DOCTYPE html>
<html lang="sw">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Mwenda Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0a0a;
            background-image:
                radial-gradient(circle at 20% 30%, #1a3a1a 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, #0f250f 0%, transparent 40%);
            color: white;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            min-height: 100vh;
            padding-bottom: 180px;
        }

        .cart-container {
            padding: 25px 20px;
        }

        .header-area {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        h2 {
            color: #4ade80;
            font-size: 1.5rem;
            margin: 0;
            font-weight: 600;
        }

        /* Delete Multi Button */
        #multi-delete-btn {
            background: #ff4545;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: bold;
            display: none;
            /* Inatokea tu kukiwa na selection */
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 69, 69, 0.3);
        }

        .instruction-text {
            font-size: 0.7rem;
            color: #666;
            margin-bottom: 20px;
            text-align: center;
        }

        /* Cart Item Styling */
        .cart-item {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        /* Ikichaguliwa (Selected) */
        .cart-item.selected {
            border: 2px solid #4ade80;
            background: rgba(74, 222, 128, 0.05);
        }

        .cart-item.selected::after {
            content: "✓";
            position: absolute;
            top: 10px;
            right: 15px;
            color: #4ade80;
            font-weight: bold;
        }

        .item-details {
            flex: 1;
        }

        .item-category {
            font-size: 0.65rem;
            color: #4ade80;
            text-transform: uppercase;
            margin-bottom: 4px;
            display: block;
        }

        .item-name {
            font-weight: 600;
            font-size: 1.05rem;
            margin: 0;
            color: #efefef;
        }

        .item-price {
            color: #fff;
            font-size: 0.9rem;
            opacity: 0.9;
            margin-top: 5px;
        }

        /* Summary Bar */
        .summary-card {
            position: fixed;
            bottom: 90px;
            left: 5%;
            width: 90%;
            background: #4ade80;
            padding: 20px;
            border-radius: 24px;
            display: none;
            justify-content: space-between;
            align-items: center;
            color: #000;
            z-index: 100;
        }

        .total-amount {
            font-size: 1.2rem;
            font-weight: 800;
        }

        /* Navigation */
        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 75px;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(25px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 1000;
        }

        .nav-link {
            text-decoration: none;
            color: #555;
            text-align: center;
            font-size: 0.65rem;
        }

        .nav-link.active {
            color: #4ade80;
        }

        .nav-icon {
            font-size: 1.5rem;
            display: block;
        }

        .loader {
            text-align: center;
            padding: 50px;
            color: #4ade80;
        }

        .empty-state {
            text-align: center;
            padding: 100px 20px;
            color: #666;
        }
    </style>
</head>

<body>

    <div class="cart-container">
        <div class="header-area">
            <h2>🛒 Kikapu</h2>
            <button id="multi-delete-btn" onclick="deleteSelected()">Futa Zilizochaguliwa</button>
            <span id="item-count"
                style="font-size: 0.8rem; background: #1a3a1a; padding: 5px 12px; border-radius: 20px; color: #4ade80;">0
                Bidhaa</span>
        </div>

        <p class="instruction-text">Gusa bidhaa moja au zaidi kuzichagua, kisha futa zote kwa pamoja.</p>

        <div id="loading" class="loader">Inapakia... ⏳</div>
        <div id="cart-content"></div>

        <div id="auth-check" class="empty-state" style="display: none;">
            <p>Tafadhali ingia ili uone kikapu chako.</p>
            <button onclick="location.href='login.html'"
                style="background:#4ade80; border:none; padding:12px 25px; border-radius:12px; font-weight:bold; margin-top:10px;">Ingia
                Sasa</button>
        </div>
    </div>

    <div id="summary-float" class="summary-card" onclick="window.location.href='checkout.html'">
        <div>
            <span style="font-size: 0.8rem;">Jumla ya Malipo</span><br>
            <span id="grand-total" class="total-amount">TSH 0</span>
        </div>
        <div style="background:#000; color:#fff; padding:10px 20px; border-radius:12px; font-weight:600;">Lipa Sasa
        </div>
    </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-link"><span class="nav-icon">🏠</span>Home</a>
        <a href="wishlist.html" class="nav-link"><span class="nav-icon">❤️</span>Wishlist</a>
        <a href="cart.html" class="nav-link active"><span class="nav-icon">🛒</span>Cart</a>
        <a href="profile.html" class="nav-link"><span class="nav-icon">👤</span>Profile</a>
    </nav>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbw5DXuO28vOzGWcOYXAWqB-02H5Xm_DMkgGuZ9gFrqDTQM8RwA_n0AvZSSqnZD89ie4/exec";
        const userPhone = localStorage.getItem('user_email');
        const isLoggedIn = localStorage.getItem('isLoggedIn');

        let selectedItems = [];

        // --- ANZA KAZI ---
        if (isLoggedIn !== 'true' || !userPhone) {
            document.getElementById('auth-check').style.display = 'block';
            document.getElementById('loading').style.display = 'none';
        } else {
            // Pakia haraka kutoka kwenye simu kwanza
            displayCachedCart();
            // Pakua data mpya kimya kimya
            fetchCart();
        }

        // 1. KAZI YA KUONYESHA BIDHAA (REUSABLE)
        function renderCartItems(cartData) {
            const list = document.getElementById('cart-content');
            const summary = document.getElementById('summary-float');
            const countBadge = document.getElementById('item-count');
            const loading = document.getElementById('loading');

            list.innerHTML = "";
            let total = 0;

            // Chuja bidhaa za huyu mteja pekee
            const items = cartData.filter(row => row[0].toString() === userPhone.toString());

            if (items.length > 0) {
                countBadge.innerText = `${items.length} Bidhaa`;

                items.forEach((item, index) => {
                    const rawPrice = item[2].toString().replace(/[^0-9]/g, '');
                    const price = parseInt(rawPrice) || 0;
                    total += price;

                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'cart-item';
                    // Kama bidhaa ilikuwa tayari selected, ibaki selected
                    if (selectedItems.includes(item[1])) itemDiv.classList.add('selected');

                    itemDiv.innerHTML = `
                <div class="item-details">
                    <span class="item-category">Bidhaa</span>
                    <p class="item-name">${item[1]}</p>
                    <p class="item-price">TSH ${price.toLocaleString()}</p>
                </div>
            `;

                    itemDiv.onclick = () => toggleSelect(itemDiv, item[1]);
                    list.appendChild(itemDiv);
                });

                summary.style.display = 'flex';
                document.getElementById('grand-total').innerText = "TSH " + total.toLocaleString();
                loading.style.display = 'none';
            } else {
                showEmpty();
            }
        }

        // 2. SOMA KWENYE SIMU (CACHING)
        function displayCachedCart() {
            const cached = localStorage.getItem('cart_cache');
            if (cached) {
                renderCartItems(JSON.parse(cached));
            }
        }

        // 3. PAKUA KUTOKA GOOGLE SHEETS (BACKGROUND SYNC)
        async function fetchCart() {
            const loading = document.getElementById('loading');

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "getUserData", phone: userPhone })
                });
                const data = await response.json();

                if (data.cart) {
                    // Hifadhi data mpya kwenye simu
                    localStorage.setItem('cart_cache', JSON.stringify(data.cart));
                    // Update kioo na data mpya kabisa
                    renderCartItems(data.cart);
                } else {
                    showEmpty();
                }
            } catch (e) {
                console.log("Mtandao unasumbua, natumia data zilizopo.");
                if (!localStorage.getItem('cart_cache')) {
                    loading.innerText = "Jaribu tena baadaye.";
                }
            }
        }

        // --- LOGIC ZA SELECT NA DELETE ---

        function toggleSelect(element, name) {
            if (element.classList.contains('selected')) {
                element.classList.remove('selected');
                selectedItems = selectedItems.filter(i => i !== name);
            } else {
                element.classList.add('selected');
                selectedItems.push(name);
            }
            updateDeleteButton();
        }

        function updateDeleteButton() {
            const btn = document.getElementById('multi-delete-btn');
            if (selectedItems.length > 0) {
                btn.style.display = 'block';
                btn.innerText = `Futa (${selectedItems.length})`;
            } else {
                btn.style.display = 'none';
            }
        }

        async function deleteSelected() {
            if (!confirm(`Ondoa bidhaa ${selectedItems.length} zilizochaguliwa?`)) return;

            const loading = document.getElementById('loading');
            loading.style.display = 'block';
            loading.innerText = "Inafuta... ⏳";

            try {
                for (const itemName of selectedItems) {
                    await fetch(API_URL, {
                        method: "POST",
                        mode: "no-cors",
                        body: JSON.stringify({
                            action: "deleteItem",
                            type: "Cart",
                            phone: userPhone,
                            itemName: itemName
                        })
                    });
                }

                // Futa cache ili ilazimishe kupakua upya data safi
                localStorage.removeItem('cart_cache');
                selectedItems = [];
                fetchCart(); // Pakia upya
            } catch (err) {
                alert("Kuna tatizo limetokea.");
                fetchCart();
            }
        }

        function showEmpty() {
            const list = document.getElementById('cart-content');
            const summary = document.getElementById('summary-float');
            const loading = document.getElementById('loading');

            list.innerHTML = `<div class="empty-state">🛍️<br>Kikapu kiko tupu.</div>`;
            summary.style.display = 'none';
            document.getElementById('item-count').innerText = "0 Bidhaa";
            document.getElementById('multi-delete-btn').style.display = 'none';
            loading.style.display = 'none';
        }
    </script>
</body>

</html>
