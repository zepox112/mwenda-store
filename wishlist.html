<!DOCTYPE html>
<html lang="sw">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wishlist - Mwenda Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4ade80;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.05);
            --danger: #ff5f5f;
            --selection: rgba(74, 222, 128, 0.2);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            transition: 0.2s ease;
        }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1a2e1a 0%, #050505 80%);
            color: white;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            user-select: none;
        }

        .wishlist-container {
            padding: 25px 20px 150px;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        h2 {
            font-size: 1.4rem;
            margin: 0;
            color: var(--primary);
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Desktop Select Button */
        .select-toggle-btn {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 6px 15px;
            border-radius: 12px;
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: 500;
        }

        .select-toggle-btn.active {
            background: var(--danger);
            border-color: var(--danger);
        }

        .select-count {
            font-size: 0.9rem;
            background: var(--primary);
            color: black;
            padding: 2px 10px;
            border-radius: 20px;
            font-weight: bold;
            display: none;
        }

        /* Card Style */
        .product-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            cursor: pointer;
        }

        .product-card:hover {
            border-color: rgba(74, 222, 128, 0.3);
        }

        .product-card.selected {
            border-color: var(--primary);
            background: var(--selection);
            transform: scale(0.98);
        }

        .product-card.selected::after {
            content: '✓';
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--primary);
            color: black;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        .product-info {
            flex: 1;
        }

        .p-name {
            font-weight: 600;
            font-size: 1rem;
            margin: 0;
            color: #fff;
        }

        .p-price {
            color: var(--primary);
            font-size: 0.9rem;
            margin-top: 4px;
            font-weight: 500;
        }

        /* Floating Delete Button */
        #floating-delete {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%) translateY(120px);
            background: var(--danger);
            color: white;
            padding: 14px 30px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 8px 25px rgba(255, 95, 95, 0.4);
            z-index: 2000;
            display: flex;
            align-items: center;
            gap: 12px;
            border: none;
            cursor: pointer;
            visibility: hidden;
            font-family: 'Poppins', sans-serif;
        }

        #floating-delete.show {
            transform: translateX(-50%) translateY(0);
            visibility: visible;
        }

        .loading-text {
            color: var(--primary);
            text-align: center;
            margin-top: 50px;
        }

        .empty-msg {
            text-align: center;
            color: #666;
            margin-top: 80px;
        }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 75px;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 1000;
        }

        .nav-item {
            text-decoration: none;
            color: #555;
            text-align: center;
            font-size: 0.65rem;
            flex: 1;
        }

        .nav-item.active {
            color: var(--primary);
        }

        .nav-icon {
            font-size: 1.3rem;
            display: block;
            margin-bottom: 3px;
        }
    </style>
</head>

<body>

    <div class="wishlist-container">
        <div class="header-section">
            <h2>❤️ Wishlist</h2>
            <div class="header-actions">
                <span id="counter" class="select-count">0</span>
                <button id="select-toggle" class="select-toggle-btn" onclick="toggleSelectionMode()">Select</button>
            </div>
        </div>

        <div id="load-msg" class="loading-text">Inatafuta... ⏳</div>
        <div id="items-list"></div>
    </div>

    <button id="floating-delete" onclick="deleteSelectedItems()">
        <span>🗑️ Futa Bidhaa (<span id="btn-count">0</span>)</span>
    </button>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span>Home</a>
        <a href="wishlist.html" class="nav-item active"><span class="nav-icon">❤️</span>Wishlist</a>
        <a href="cart.html" class="nav-item"><span class="nav-icon">🛒</span>Cart</a>
        <a href="profile.html" class="nav-item"><span class="nav-icon">👤</span>Profile</a>
    </nav>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw5DXuO28vOzGWcOYXAWqB-02H5Xm_DMkgGuZ9gFrqDTQM8RwA_n0AvZSSqnZD89ie4/exec";
        const userPhone = localStorage.getItem('user_email');

        let selectedItems = [];
        let isSelectionMode = false;
        let pressTimer;

        // --- MFUMO WA KUPAKIA HARAKA (CACHING) ---

        function renderWishlistItems(items) {
            const listDiv = document.getElementById('items-list');
            const loadMsg = document.getElementById('load-msg');

            listDiv.innerHTML = "";
            // Chuja bidhaa za huyu mteja pekee
            const myItems = items.filter(item => String(item[0]) === String(userPhone));

            if (myItems.length > 0) {
                myItems.forEach((item, index) => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.id = `item-${index}`;
                    card.innerHTML = `
                <div class="product-info">
                    <p class="p-name">${item[1]}</p>
                    <p class="p-price">TZS ${item[2]}</p>
                </div>
            `;

                    // Mambo ya Long Press & Click
                    card.addEventListener('touchstart', () => startPress(item[1], card.id));
                    card.addEventListener('touchend', cancelPress);
                    card.addEventListener('mousedown', () => startPress(item[1], card.id));
                    card.addEventListener('mouseup', cancelPress);
                    card.addEventListener('click', () => handleItemClick(item[1], card.id));

                    listDiv.appendChild(card);
                });
                loadMsg.style.display = 'none';
            } else {
                listDiv.innerHTML = `<div class="empty-msg">Huna kitu kwenye Wishlist yako bado.</div>`;
                loadMsg.style.display = 'none';
            }
        }

        async function loadWishlist() {
            // 1. Angalia kama kuna data kwenye simu (Local Storage)
            const cachedData = localStorage.getItem('wishlist_cache');
            if (cachedData) {
                // Ioneshe hapo hapo!
                renderWishlistItems(JSON.parse(cachedData));
            }

            // 2. Pakua data mpya kutoka mtandaoni kimya kimya
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "getUserData", phone: userPhone })
                });
                const data = await response.json();

                // Hifadhi data mpya kwa safari ijayo
                localStorage.setItem('wishlist_cache', JSON.stringify(data.wishlist));

                // Update muonekano sasa hivi
                renderWishlistItems(data.wishlist);
            } catch (e) {
                console.log("Internet inasumbua, nimetumia data za kwenye simu.");
                if (!cachedData) {
                    document.getElementById('load-msg').innerText = "Angalia mtandao wako!";
                }
            }
        }

        // --- LOGIC ZA SELECTION & DELETE ---

        function toggleSelectionMode() {
            isSelectionMode = !isSelectionMode;
            const btn = document.getElementById('select-toggle');
            if (isSelectionMode) {
                btn.innerText = "Ghairi";
                btn.classList.add('active');
            } else {
                btn.innerText = "Select";
                btn.classList.remove('active');
                clearSelections();
            }
        }

        function clearSelections() {
            selectedItems = [];
            const cards = document.querySelectorAll('.product-card');
            cards.forEach(c => c.classList.remove('selected'));
            updateUI();
        }

        function startPress(name, id) {
            pressTimer = setTimeout(() => {
                if (!isSelectionMode) toggleSelectionMode();
                toggleSelect(name, id);
                if (window.navigator.vibrate) window.navigator.vibrate(50);
            }, 700);
        }

        function cancelPress() { clearTimeout(pressTimer); }

        function handleItemClick(name, id) {
            if (isSelectionMode) {
                toggleSelect(name, id);
            }
        }

        function toggleSelect(name, id) {
            const card = document.getElementById(id);
            const index = selectedItems.indexOf(name);
            if (index > -1) {
                selectedItems.splice(index, 1);
                card.classList.remove('selected');
            } else {
                selectedItems.push(name);
                card.classList.add('selected');
            }
            updateUI();
        }

        function updateUI() {
            const fBtn = document.getElementById('floating-delete');
            const counter = document.getElementById('counter');
            const btnCount = document.getElementById('btn-count');

            if (selectedItems.length > 0) {
                fBtn.classList.add('show');
                counter.style.display = 'block';
                counter.innerText = selectedItems.length;
                btnCount.innerText = selectedItems.length;
            } else {
                fBtn.classList.remove('show');
                counter.style.display = 'none';
            }
        }

        async function deleteSelectedItems() {
            const idadi = selectedItems.length;
            if (!confirm(`Ondoa bidhaa hizi ${idadi} kwenye Wishlist?`)) return;

            const fBtn = document.getElementById('floating-delete');
            fBtn.innerHTML = "Inafuta... ⏳";
            fBtn.style.background = "#555";

            // Mchakato wa kufuta
            for (let item of selectedItems) {
                try {
                    await fetch(SCRIPT_URL, {
                        method: "POST",
                        mode: "no-cors",
                        body: JSON.stringify({
                            action: "deleteItem",
                            type: "Wishlist",
                            phone: userPhone,
                            itemName: item
                        })
                    });
                } catch (e) { }
            }

            // Safisha kache na refresh kimya kimya
            localStorage.removeItem('wishlist_cache');
            alert("Zimeondolewa!");
            location.reload(); // Refresh ili kuhakikisha kila kitu kiko safi
        }

        // Anzisha kazi
        loadWishlist();
    </script>
</body>

</html>
