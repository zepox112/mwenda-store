<!DOCTYPE html>
<html lang="sw">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zepox - Karibu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            transition: 0.3s;
        }

        body {
            background: radial-gradient(circle at center, #1a1c1a 0%, #050505 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            color: white;
        }

        .glass-box {
            background: rgba(30, 30, 30, 0.65);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 40px 30px;
            width: 350px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
        }

        .profile-section {
            position: relative;
            width: 90px;
            height: 90px;
            margin: 0 auto 20px;
            cursor: pointer;
        }

        #profile-preview {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #4ade80;
            background: #111;
        }

        .upload-btn {
            position: absolute;
            bottom: 0;
            right: 0;
            background: #4ade80;
            color: black;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 12px;
            color: #4ade80;
            margin-bottom: 15px;
            outline: none;
        }

        .btn-auth {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: #4ade80;
            color: #000;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-auth:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .toggle-text {
            margin-top: 20px;
            font-size: 0.85rem;
            color: #bbb;
            cursor: pointer;
        }

        .toggle-text span {
            color: #4ade80;
            font-weight: bold;
            text-decoration: underline;
        }

        .loading {
            font-size: 0.8rem;
            color: #4ade80;
            display: none;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <div class="glass-box">
        <h2 id="auth-title" style="color: #4ade80;">LOGIN</h2>

        <div id="reg-photo-area" class="profile-section" onclick="document.getElementById('img-input').click()">
            <img id="profile-preview" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
            <div class="upload-btn">📸</div>
        </div>
        <input type="file" id="img-input" hidden accept="image/*" onchange="uploadToImgBB(event)">

        <div id="load-msg" class="loading">Inapakiwa... ⏳</div>

        <input type="text" id="reg-name" placeholder="Jina Kamili" style="display: none;">
        <input type="number" id="reg-phone" placeholder="Namba ya Simu">
        <input type="password" id="reg-pass" placeholder="Password">

        <button class="btn-auth" id="btn-submit" onclick="handleAuth()">INGIA (LOGIN)</button>

        <p class="toggle-text" id="toggle-btn" onclick="toggleAuth()">
            Huna akaunti? <span>Jisajili hapa</span>
        </p>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzUqtwF_2bkAALiqMPVq_Z0H10suZZQqLZRaen1-83Az_1uEhp7sYopF5lM8kznF4ST/exec";
        const IMGBB_KEY = "9d19a0f1d80f89446815cfbd8d40ee8c";

        let isLoginMode = true;
        let finalImageUrl = "https://cdn-icons-png.flaticon.com/512/149/149071.png";

        function toggleAuth() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "LOGIN" : "REGISTER";
            document.getElementById('reg-name').style.display = isLoginMode ? "none" : "block";
            document.getElementById('reg-photo-area').style.display = isLoginMode ? "none" : "block";
            document.getElementById('btn-submit').innerText = isLoginMode ? "INGIA (LOGIN)" : "TENGENEZA AKAUNTI";
            document.getElementById('toggle-btn').innerHTML = isLoginMode ?
                "Huna akaunti? <span>Jisajili hapa</span>" : "Tayari una akaunti? <span>Ingia hapa</span>";
        }

        async function uploadToImgBB(event) {
            const file = event.target.files[0];
            if (!file) return;
            document.getElementById('load-msg').style.display = 'block';
            document.getElementById('btn-submit').disabled = true;

            const formData = new FormData();
            formData.append("image", file);

            const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: formData });
            const data = await res.json();
            if (data.success) {
                finalImageUrl = data.data.url;
                document.getElementById('profile-preview').src = finalImageUrl;
                document.getElementById('load-msg').innerText = "Picha tayari! ✅";
                document.getElementById('btn-submit').disabled = false;
            }
        }

        async function handleAuth() {
            const phone = document.getElementById('reg-phone').value;
            const pass = document.getElementById('reg-pass').value;
            const name = document.getElementById('reg-name').value;

            if (!phone || !pass) return alert("Jaza taarifa zote!");

            document.getElementById('load-msg').style.display = 'block';
            document.getElementById('load-msg').innerText = "Tafadhali subiri... ⏳";

            if (isLoginMode) {
                // Mfumo wa LOGIN
                const response = await fetch(SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "login", phone, pass })
                });
                const result = await response.json();

                if (result.status === "success") {
                    localStorage.setItem('user_name', result.name);
                    localStorage.setItem('user_email', phone);
                    localStorage.setItem('user_photo', result.photo);
                    localStorage.setItem('isLoggedIn', 'true');
                    location.href = 'index.html';
                } else {
                    alert("Akaunti haipo! Tafadhali nenda sehemu ya 'Jisajili hapa' utengeneze akaunti.");
                    document.getElementById('load-msg').style.display = 'none';
                }
            } else {
                // Mfumo wa REGISTER
                if (!name) return alert("Jaza jina lako!");
                const payload = { action: "register", name, phone, pass, photo: finalImageUrl };

                await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });

                localStorage.setItem('user_name', name);
                localStorage.setItem('user_email', phone);
                localStorage.setItem('user_photo', finalImageUrl);
                localStorage.setItem('isLoggedIn', 'true');

                alert("Karibu Zepox! Akaunti imetengenezwa.");
                location.href = 'index.html';
            }
        }

        // Anza na Login Mode ikijificha sehemu ya picha
        window.onload = () => { if (isLoginMode) toggleAuth(); toggleAuth(); }; 
    </script>
</body>

</html>
