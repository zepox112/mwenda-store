<!DOCTYPE html>
<html lang="sw">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mwendashop - Katalogi Rasmi</title>
    <style>
        :root {
            --p-color: #2c3e50;
            --s-color: #27ae60;
            --bg: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: var(--bg);
        }

        header {
            background: var(--p-color);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .container {
            max-width: 1100px;
            margin: 20px auto;
            padding: 0 15px;
        }

        /* Sehemu ya Filter */
        .filter-nav {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 22px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            background: white;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            font-weight: bold;
            transition: 0.3s;
        }

        .btn.active {
            background: var(--s-color);
            color: white;
        }

        /* Grid ya Bidhaa */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.06);
            transition: 0.3s;
            border: 1px solid #eee;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            background: #f0f0f0;
        }

        .card-body {
            padding: 15px;
        }

        .cat-tag {
            font-size: 10px;
            color: var(--s-color);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .price {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--p-color);
            display: block;
            margin-top: 10px;
        }

        #status {
            text-align: center;
            padding: 40px;
            font-size: 1.1rem;
            color: #666;
        }
    </style>
</head>

<body>

    <header>
        <h1>MWENDASHOP</h1>
        <p>Angalia bidhaa zetu kulingana na kategoria</p>
    </header>

    <div class="container">
        <div class="filter-nav" id="filter-container">
            <button class="btn active" onclick="filterItems('all', this)">Zote</button>
        </div>

        <div id="status">Inapakia database ya bidhaa...</div>
        <div class="grid" id="product-display"></div>
    </div>

    <script>
        // Hii ndiyo link uliyotoa ya Google Apps Script
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwcdwgYb4McT-NXshkHeYYTndiyLbseAcnVw5HDyjxOwUXXRtM_LC5b3DCv_J29Eg8mmw/exec';
        let allProducts = [];

        async function loadShop() {
            try {
                const response = await fetch(SCRIPT_URL);
                allProducts = await response.json();

                if (allProducts.length === 0) {
                    document.getElementById('status').innerText = "Database iko tupu. Ongeza bidhaa kwenye Google Sheet.";
                    return;
                }

                renderProducts(allProducts);
                generateFilters(allProducts);
                document.getElementById('status').style.display = 'none';
            } catch (error) {
                console.error(error);
                document.getElementById('status').innerText = "Imeshindwa kuunganishwa. Hakikisha 'Anyone' imewekwa kwenye Deployment.";
            }
        }

        function renderProducts(items) {
            const display = document.getElementById('product-display');
            display.innerHTML = items.map(item => `
            <div class="card">
                <img src="${item.imageurl || 'https://via.placeholder.com/250'}" alt="${item.name}">
                <div class="card-body">
                    <span class="cat-tag">${item.category || 'MENGINE'}</span>
                    <h3 style="margin: 8px 0; font-size: 1.1rem;">${item.name}</h3>
                    <p style="font-size: 0.9rem; color: #777; margin: 0;">${item.description || ''}</p>
                    <span class="price">Tsh ${Number(item.price).toLocaleString()}</span>
                </div>
            </div>
        `).join('');
        }

        function generateFilters(items) {
            const filterBox = document.getElementById('filter-container');
            const categories = [...new Set(items.map(i => i.category))].filter(c => c);

            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.innerText = cat;
                btn.onclick = (e) => filterItems(cat, e.target);
                filterBox.appendChild(btn);
            });
        }

        function filterItems(category, btn) {
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const filtered = category === 'all' ? allProducts : allProducts.filter(i => i.category === category);
            renderProducts(filtered);
        }

        // Anzisha mfumo
        loadShop();
    </script>

</body>

</html>
