<!DOCTYPE html>
<html lang="sw">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Mwenda Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4ade80;
            --bg: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1a3a1a 0%, #0a0a0a 80%);
            color: white;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 20px;
            padding-bottom: 100px;
        }

        .checkout-container {
            max-width: 500px;
            margin: 0 auto;
        }

        h2 {
            color: var(--primary);
            text-align: center;
            margin-bottom: 30px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 0.9rem;
            color: var(--primary);
            margin-bottom: 15px;
            display: block;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Form Styling */
        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            margin-bottom: 5px;
            opacity: 0.8;
        }

        input,
        select {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 12px;
            color: white;
            font-family: inherit;
        }

        /* Order Summary */
        .order-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-weight: 800;
            font-size: 1.1rem;
            margin-top: 15px;
            color: var(--primary);
        }

        /* Confirm Button */
        .btn-confirm {
            width: 100%;
            background: var(--primary);
            color: black;
            border: none;
            padding: 16px;
            border-radius: 15px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(74, 222, 128, 0.2);
            margin-top: 10px;
        }

        .btn-confirm:active {
            transform: scale(0.98);
        }

        .back-link {
            display: block;
            text-align: center;
            color: #888;
            text-decoration: none;
            font-size: 0.85rem;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <div class="checkout-container">
        <h2>Kamilisha Agizo</h2>

        <div class="card">
            <span class="section-title">📍 Taarifa za Usafirishaji</span>
            <div class="input-group">
                <label>Jina Kamili</label>
                <input type="text" id="cust-name" placeholder="Mfano: Zephaniah Kennedy">
            </div>
            <div class="input-group">
                <label>Eneo Unapoishi (Arusha)</label>
                <input type="text" id="cust-location" placeholder="Mfano: Kijenge Juu">
            </div>
            <div class="input-group">
                <label>Njia ya Malipo</label>
                <select id="payment-method">
                    <option value="Cash on Delivery">Lipia Unapopokea (Cash)</option>
                    <option value="M-Pesa/Tigo Pesa">M-Pesa / Tigo Pesa</option>
                </select>
            </div>
        </div>

        <div class="card">
            <span class="section-title">📦 Muhtasari wa Bidhaa</span>
            <div id="order-items-list">
            </div>
            <div class="total-row">
                <span>Jumla Kuu:</span>
                <span id="grand-total">TSH 0</span>
            </div>
        </div>

        <button class="btn-confirm" onclick="processOrder()">KAMILISHA AGIZO ✅</button>

        <a href="cart.html" class="back-link">← Rudi kwenye Kikapu</a>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbw5DXuO28vOzGWcOYXAWqB-02H5Xm_DMkgGuZ9gFrqDTQM8RwA_n0AvZSSqnZD89ie4/exec";
        const userPhone = localStorage.getItem('user_email');
        let myCartItems = [];
        let finalTotal = 0;

        // Pakia data za kikapu pindi tu ukurasa unapofunguka
        async function loadCheckoutData() {
            if (!userPhone) {
                window.location.href = 'login.html';
                return;
            }

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "getUserData", phone: userPhone })
                });
                const data = await response.json();

                const listDiv = document.getElementById('order-items-list');
                const totalDiv = document.getElementById('grand-total');

                if (data.cart) {
                    myCartItems = data.cart.filter(item => String(item[0]) === String(userPhone));

                    if (myCartItems.length === 0) {
                        alert("Kikapu chako kiko tupu!");
                        window.location.href = "index.html";
                        return;
                    }

                    listDiv.innerHTML = "";
                    myCartItems.forEach(item => {
                        const price = parseInt(item[2].toString().replace(/[^0-9]/g, '')) || 0;
                        finalTotal += price;
                        listDiv.innerHTML += `
                            <div class="order-item">
                                <span>${item[1]}</span>
                                <span>TSH ${price.toLocaleString()}</span>
                            </div>
                        `;
                    });

                    totalDiv.innerText = "TSH " + finalTotal.toLocaleString();
                }
            } catch (e) {
                alert("Hitilafu ya mtandao!");
            }
        }

        function processOrder() {
            const name = document.getElementById('cust-name').value;
            const location = document.getElementById('cust-location').value;
            const payment = document.getElementById('payment-method').value;

            if (!name || !location) {
                alert("Tafadhali jaza jina na eneo unapoishi.");
                return;
            }

            // Tengeneza ujumbe wa WhatsApp
            let message = `*AGIZO JIPYA - MWENDA STORE*%0A`;
            message += `---------------------------%0A`;
            message += `*Mteja:* ${name}%0A`;
            message += `*Simu:* ${userPhone}%0A`;
            message += `*Mahali:* ${location}%0A`;
            message += `*Malipo:* ${payment}%0A`;
            message += `---------------------------%0A`;
            message += `*BIDHAA:*%0A`;

            myCartItems.forEach((item, index) => {
                message += `${index + 1}. ${item[1]} - ${item[2]}%0A`;
            });

            message += `---------------------------%0A`;
            message += `*JUMLA KUU: TSH ${finalTotal.toLocaleString()}*%0A`;
            message += `---------------------------%0A`;
            message += `_Tafadhali thibitisha agizo langu._`;

            // Namba yako ya WhatsApp (Badilisha 255... na namba yako)
            const myWhatsApp = "255747185190";
            const whatsappUrl = `https://wa.me/${myWhatsApp}?text=${message}`;

            // Fungua WhatsApp
            window.open(whatsappUrl, '_blank');

            // Hiari: Unaweza kusafisha kikapu baada ya hapa kwa kutuma action nyingine ya kufuta vyote.
            alert("Agizo lako limetengenezwa! Unapelekwa WhatsApp kukamilisha.");
        }

        loadCheckoutData();
    </script>
</body>

</html>
