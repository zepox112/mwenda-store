<!DOCTYPE html>
<html lang="sw">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zepox - Profaili Yangu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle at top right, #1a2e1a 0%, #050505 100%);
            color: white;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px 30px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        /* Profile Image Styling with Edit Button */
        .img-container {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
        }

        #user-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #4ade80;
            padding: 5px;
            background: rgba(0, 0, 0, 0.2);
        }

        /* Edit Icon Badge */
        .edit-badge {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: #4ade80;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 3px solid #050505;
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.3);
        }

        .edit-badge:active {
            transform: scale(0.9);
        }

        h2 {
            color: #4ade80;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .user-id {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 25px;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .label {
            font-size: 0.7rem;
            color: #4ade80;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .value {
            font-size: 1rem;
            color: #fff;
            margin-top: 3px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 15px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }

        .btn-home {
            background: #4ade80;
            color: #000;
        }

        .btn-logout {
            background: transparent;
            border: 1px solid rgba(255, 95, 95, 0.5);
            color: #ff5f5f;
        }

        /* Hidden File Input */
        #file-input {
            display: none;
        }
    </style>
</head>

<body>

    <div class="profile-card">
        <div class="img-container">
            <img id="user-img" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Profile">
            <label for="file-input" class="edit-badge">
                <span style="font-size: 18px;">📷</span>
            </label>
            <input type="file" id="file-input" accept="image/*">
        </div>

        <h2 id="u-name-top">Mteja</h2>
        <p class="user-id">ID: <span id="u-id-val">0000</span></p>

        <div class="info-box">
            <div class="label">Jina Kamili</div>
            <div class="value" id="u-name">...</div>
        </div>

        <div class="info-box">
            <div class="label">Namba ya Simu</div>
            <div class="value" id="u-phone">...</div>
        </div>

        <button class="btn btn-home" onclick="location.href='index.html'">Rudi Dukani</button>
        <button class="btn btn-logout" onclick="logout()">Toka Kwenye Akaunti</button>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxY_C6F9pUpz5XyhJSUkjqBQLVCBtXH5Mztv4ddrUM9DM-CuevThqeFk0vyi47JvZXm/exec";
        const IMGBB_KEY = "9d19a0f1d80f89446815cfbd8d40ee8c";

        window.onload = function () {
            const name = localStorage.getItem('user_name') || "Mteja";
            const phone = localStorage.getItem('user_email') || "Hujaingia";
            const photo = localStorage.getItem('user_photo');

            document.getElementById('u-name').innerText = name;
            document.getElementById('u-name-top').innerText = name;
            document.getElementById('u-phone').innerText = phone;
            document.getElementById('u-id-val').innerText = phone.substring(phone.length - 4);

            if (photo && photo !== "undefined" && photo !== "" && photo !== "null") {
                document.getElementById('user-img').src = photo;
            }
        }

        const fileInput = document.getElementById('file-input');
        const userImg = document.getElementById('user-img');

        fileInput.addEventListener('change', function () {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();

                // Onyesha inapakia (Preview & Loading state)
                userImg.style.opacity = "0.4";

                reader.onload = async function (e) {
                    const base64Data = e.target.result.split(',')[1]; // Toa header ya base64
                    const phone = localStorage.getItem('user_email');

                    try {
                        // 1. Tuma Picha ImgBB kwanza upate Link
                        let formData = new FormData();
                        formData.append("image", base64Data);

                        const imgbbResponse = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {
                            method: "POST",
                            body: formData
                        });

                        const imgbbData = await imgbbResponse.json();

                        if (imgbbData.success) {
                            const directLink = imgbbData.data.url; // Hii ndio link ya picha

                            // 2. Tuma Link kwenda Google Sheets
                            await fetch(SCRIPT_URL, {
                                method: "POST",
                                mode: "no-cors",
                                body: JSON.stringify({
                                    action: "updatePhoto",
                                    phone: phone,
                                    photoData: directLink // Tunatuma link, siyo picha nzito
                                })
                            });

                            // 3. Update kioo na LocalStorage
                            userImg.src = directLink;
                            localStorage.setItem('user_photo', directLink);

                            userImg.style.opacity = "1";
                            alert("Picha imebadilishwa kikamilifu! ✅");
                        } else {
                            throw new Error("ImgBB Upload Failed");
                        }

                    } catch (error) {
                        console.error("Error:", error);
                        alert("Kuna tatizo la mtandao. Jaribu tena.");
                        userImg.style.opacity = "1";
                    }
                }
                reader.readAsDataURL(file);
            }
        });

        function logout() {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('user_photo'); // Optional: safisha picha akitoka
            location.href = 'login.html';
        }
    </script>
</body>

</html>
