<!DOCTYPE html>
<html lang="sw">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Mwenda Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4ade80;
            --bg: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1a3a1a 0%, #0a0a0a 80%);
            color: white;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 20px;
            padding-bottom: 50px;
            min-height: 100vh;
        }

        .checkout-container {
            max-width: 500px;
            margin: 0 auto;
        }

        h2 {
            color: var(--primary);
            text-align: center;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .section-title {
            font-size: 0.85rem;
            color: var(--primary);
            margin-bottom: 15px;
            display: block;
            font-weight: 600;
            text-transform: uppercase;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            margin-bottom: 6px;
            opacity: 0.7;
        }

        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            padding: 12px;
            border-radius: 12px;
            color: white;
            font-family: inherit;
            box-sizing: border-box;
        }

        /* Payment Grid */
        .payment-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 10px;
        }

        .payment-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            padding: 15px 10px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .payment-card img {
            width: 55px;
            height: 55px;
            object-fit: contain;
            border-radius: 12px;
        }

        .payment-card span {
            font-size: 0.7rem;
            font-weight: 600;
        }

        .payment-card.active {
            border-color: var(--primary);
            background: rgba(74, 222, 128, 0.15);
            transform: translateY(-3px);
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            font-size: 1.1rem;
            margin-top: 15px;
            color: var(--primary);
        }

        .btn-confirm {
            width: 100%;
            background: var(--primary);
            color: #052e16;
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body>

    <div class="checkout-container">
        <h2>Kamilisha Agizo</h2>

        <div class="card">
            <span class="section-title">📍 Maelezo ya Mteja</span>
            <div class="input-group">
                <label>Jina Kamili</label>
                <input type="text" id="cust-name" placeholder="Mfano: Zephaniah Kennedy">
            </div>
            <div class="input-group">
                <label>Eneo Unapoishi (Arusha)</label>
                <input type="text" id="cust-location" placeholder="Mfano: Kijenge Juu">
            </div>

            <label style="margin-top: 15px; display: block; font-size: 0.8rem;">Chagua Njia ya Malipo:</label>

            <div class="payment-grid">
                <div class="payment-card" onclick="selectPayment('M-Pesa', this)">
                    <img src="https://i.ibb.co/4RVDBsth/voda.jpg" alt="M-Pesa">
                    <span>M-Pesa</span>
                </div>

                <div class="payment-card" onclick="selectPayment('Mixx by yass', this)">
                    <img src="https://i.ibb.co/B5pMSMQV/yass.jpg" alt="Tigo">
                    <span>Mixx by yass</span>
                </div>

                <div class="payment-card" onclick="selectPayment('Airtel Money', this)">
                    <img src="https://i.ibb.co/3yfFHHdw/airtel.jpg" alt="Airtel">
                    <span>Airtel Money</span>
                </div>

                <div class="payment-card" onclick="selectPayment('HaloPesa', this)">
                    <img src="https://i.ibb.co/XkMkKZfJ/halo.jpg" alt="HaloPesa">
                    <span>HaloPesa</span>
                </div>

                <div class="payment-card" style="grid-column: span 2;"
                    onclick="selectPayment('Cash on Delivery', this)">
                    <img src="https://cdn-icons-png.flaticon.com/512/2331/2331714.png" alt="Cash">
                    <span>Lipia Unapopokea (Cash)</span>
                </div>
            </div>
        </div>

        <div class="card">
            <span class="section-title">📦 Muhtasari</span>
            <div id="order-items-list">
                <p style="text-align: center; color: #666;">Inapakia...</p>
            </div>
            <div class="total-row">
                <span>Jumla:</span>
                <span id="grand-total">TSH 0</span>
            </div>
        </div>

        <button class="btn-confirm" onclick="processOrder()">KAMILISHA AGIZO ✅</button>
    </div>

    <script>
        // ... (Script inabaki ile ile ya mwanzo, nimehakikisha hizi link zinafanya kazi sasa)
        const API_URL = "https://script.google.com/macros/s/AKfycbw5DXuO28vOzGWcOYXAWqB-02H5Xm_DMkgGuZ9gFrqDTQM8RwA_n0AvZSSqnZD89ie4/exec";
        const userPhone = localStorage.getItem('user_email');
        let myCartItems = [];
        let finalTotal = 0;
        let selectedPaymentMethod = "";

        async function loadCheckoutData() {
            if (!userPhone) return;
            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "getUserData", phone: userPhone })
                });
                const data = await response.json();
                const listDiv = document.getElementById('order-items-list');
                const totalDiv = document.getElementById('grand-total');

                if (data.cart) {
                    myCartItems = data.cart.filter(item => String(item[0]) === String(userPhone));
                    listDiv.innerHTML = "";
                    finalTotal = 0;
                    myCartItems.forEach(item => {
                        const price = parseInt(item[2].toString().replace(/[^0-9]/g, '')) || 0;
                        finalTotal += price;
                        listDiv.innerHTML += `<div class="order-item"><span>${item[1]}</span><span>${price.toLocaleString()}</span></div>`;
                    });
                    totalDiv.innerText = "TSH " + finalTotal.toLocaleString();
                }
            } catch (e) { console.log(e); }
        }

        function selectPayment(method, element) {
            document.querySelectorAll('.payment-card').forEach(card => card.classList.remove('active'));
            element.classList.add('active');
            selectedPaymentMethod = method;
        }

        function processOrder() {
            const name = document.getElementById('cust-name').value;
            const location = document.getElementById('cust-location').value;
            if (!name || !location || !selectedPaymentMethod) {
                alert("Jaza taarifa zote!"); return;
            }
            let message = `*AGIZO JIPYA - MWENDA STORE*%0A*Mteja:* ${name}%0A*Mahali:* ${location}%0A*Malipo:* ${selectedPaymentMethod}%0A*JUMLA:* TSH ${finalTotal.toLocaleString()}`;
            window.open(`https://wa.me/255747185190?text=${message}`, '_blank');
        }

        loadCheckoutData();
    </script>
</body>

</html>
